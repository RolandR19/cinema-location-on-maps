<!DOCTYPE html>
<html lang="fr">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinéMap Data Explorer | Advanced Data Science</title>
    
    <!-- Leaflet & Chart.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        .ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
            display: grid;
            grid-template-columns: 380px 1fr;
            grid-template-rows: auto 1fr auto;
            padding: 20px;
            gap: 20px;
        }

        .interactive { pointer-events: auto; }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
        }

        .movie-tray {
            display: flex; gap: 16px; overflow-x: auto; padding: 10px 5px;
            scrollbar-width: thin; scrollbar-color: #3b82f6 transparent;
        }

        .movie-item {
            min-width: 350px; max-width: 350px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .movie-item:hover { transform: translateY(-10px); border-color: #3b82f6; }

        .filter-section { border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 15px; }
        
        /* Tooltip & Popups Custom */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; width: 300px !important; }

        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        .stat-badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-overlay">
    <!-- Sidebar de Contrôle Scientifique -->
    <aside class="glass-card interactive rounded-[2.5rem] p-8 flex flex-col h-full overflow-y-auto">
        <div class="mb-8">

        <div class="space-y-6">
            <!-- Filtres Temporels -->
            <div class="filter-section">
                <label class="text-[10px] font-black uppercase text-slate-400 mb-3 block tracking-widest">Séquence Temporelle</label>
                <div class="flex items-center gap-3">
                    <input id="yearMin" type="number" placeholder="1915" class="w-1/2 p-3 rounded-xl bg-slate-50 border border-slate-100 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                    <span class="text-slate-300">→</span>
                    <input id="yearMax" type="number" placeholder="2025" class="w-1/2 p-3 rounded-xl bg-slate-50 border border-slate-100 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Filtre Qualitatif -->
            <div class="filter-section">
                <label class="text-[10px] font-black uppercase text-slate-400 mb-3 block tracking-widest">Score IMDb Minimum</label>
                <input id="ratingMin" type="range" min="0" max="10" step="0.1" value="0" class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-blue-600">
                <div class="flex justify-between text-[11px] font-black mt-2">
                    <span class="text-slate-400">0.0</span>
                    <span id="ratingVal" class="bg-blue-50 text-blue-600 px-2 py-1 rounded-lg">0.0</span>
                    <span class="text-slate-400">10.0</span>
                </div>
            </div>

            <!-- Catégories -->
            <div class="filter-section">
                <label class="text-[10px] font-black uppercase text-slate-400 mb-3 block tracking-widest">Genres Clusters</label>
                <div id="genreContainer" class="flex flex-wrap gap-1.5">
                    <!-- Injecté -->
                </div>
            </div>
        </div>

        <!-- Visualisations Data Science -->
        <div class="mt-8 space-y-8">
            <div class="p-4 bg-slate-50 rounded-3xl border border-slate-100">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-4 text-center tracking-widest">Distribution des Scores</p>
                <canvas id="ratingChart" height="140"></canvas>
            </div>
            <div class="p-4 bg-slate-50 rounded-3xl border border-slate-100">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-4 text-center tracking-widest">Évolution de Production</p>
                <canvas id="yearChart" height="140"></canvas>
            </div>
        </div>
        
        <button id="resetFilters" class="mt-8 w-full py-4 bg-slate-900 text-white text-[10px] font-black uppercase rounded-2xl hover:bg-blue-600 transition-all tracking-[0.2em] shadow-lg shadow-slate-200">
            Réinitialiser les paramètres
        </button>
    </aside>

</div>

    let map, markersLayer, ratingChart, yearChart;
    let selectedGenres = new Set();

    function init() {
        map = L.map('map', { zoomControl: false }).setView([25, 10], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
        markersLayer = L.layerGroup().addTo(map);

        initCharts();
        populateGenres();
        bindEvents();
        applyFilters();
    }

    function initCharts() {
        const baseOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false }, ticks: { font: { size: 9, weight: 'bold' } } }, y: { display: false } }
        };

        ratingChart = new Chart(document.getElementById('ratingChart'), {
            type: 'bar',
            data: { labels: ['<7', '7-8', '8-9', '>9'], datasets: [{ data: [0,0,0,0], backgroundColor: '#3b82f6', borderRadius: 6 }] },
            options: baseOptions
        });

        yearChart = new Chart(document.getElementById('yearChart'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#0f172a', borderWidth: 3, tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)' }] },
            options: baseOptions
        });
    }

    function populateGenres() {
        const genres = [...new Set(movieData.flatMap(m => m.genres || []))].sort();
        const container = document.getElementById('genreContainer');
        genres.forEach(genre => {
            const btn = document.createElement('button');
            btn.className = "text-[9px] font-black px-3 py-1.5 bg-slate-100 text-slate-500 rounded-lg transition-all hover:bg-slate-200 uppercase tracking-tighter";
            btn.innerText = genre;
            btn.onclick = () => {
                if(selectedGenres.has(genre)) {
                    selectedGenres.delete(genre);
                    btn.classList.replace('bg-blue-600', 'bg-slate-100');
                    btn.classList.replace('text-white', 'text-slate-500');
                } else {
                    selectedGenres.add(genre);
                    btn.classList.replace('bg-slate-100', 'bg-blue-600');
                    btn.classList.replace('text-slate-500', 'text-white');
                }
                applyFilters();
            };
            container.appendChild(btn);
        });
    }

    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const yMin = parseInt(document.getElementById('yearMin').value) || 0;
        const yMax = parseInt(document.getElementById('yearMax').value) || 3000;
        const rMin = parseFloat(document.getElementById('ratingMin').value);

        const filtered = movieData.filter(m => {
            const multiSearch = [
                m.title, m.director, m.writer, m.locations, 
                m.actor_1, m.actor_2, m.actor_3, 
                m.production_company, m.distributor
            ].join(' ').toLowerCase();

            const matchesSearch = !search || multiSearch.includes(search);
            const matchesYear = m.release_year >= yMin && m.release_year <= yMax;
            const matchesRating = (m.imdb_rating || 0) >= rMin;
            const matchesGenre = selectedGenres.size === 0 || (m.genres && m.genres.some(g => selectedGenres.has(g)));

            return matchesSearch && matchesYear && matchesRating && matchesGenre;
        });

        updateUI(filtered);
    }

    function updateUI(data) {
        markersLayer.clearLayers();
        const tray = document.getElementById('movieTray');
        tray.innerHTML = "";
        document.getElementById('resultCount').innerText = `${data.length} PRODUCTIONS`;

        data.forEach(m => {
            // Marker
            const marker = L.circleMarker([m.latitude, m.longitude], {
                radius: 10, color: '#fff', weight: 2, fillColor: '#3b82f6', fillOpacity: 0.8
            });
            
            const popup = `
                <div class="bg-slate-900 text-white p-5">
                    <p class="text-[10px] font-black text-blue-400 uppercase mb-1">${m.release_year} • IMDB ${m.imdb_rating}</p>
                    <h4 class="text-xl font-black uppercase tracking-tighter leading-none mb-4">${m.title}</h4>
                    <div class="space-y-2 text-[11px]">
                        <p><b class="text-slate-500">DIR:</b> ${m.director || 'N/A'}</p>
                        <p><b class="text-slate-500">CAST:</b> ${[m.actor_1, m.actor_2].filter(Boolean).join(', ')}</p>
                        <p class="pt-2 border-t border-slate-800 text-slate-400 italic">${m.locations}</p>
                    </div>
                </div>
            `;
            marker.bindPopup(popup);
            markersLayer.addLayer(marker);

            // Card
            const card = document.createElement('div');
            card.className = "movie-item glass-card rounded-[2rem] p-6 border-l-[12px] border-blue-600 flex flex-col";
            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div class="flex gap-2">
                        <span class="stat-badge bg-blue-50 text-blue-600">${m.release_year}</span>
                        <span class="stat-badge bg-yellow-50 text-yellow-600">★ ${m.imdb_rating}</span>
                    </div>
                    <span class="text-[10px] font-bold text-slate-300 uppercase">${m.distributor || ''}</span>
                </div>
                
                <h3 class="text-2xl font-black uppercase tracking-tighter leading-none mb-1 truncate text-slate-900">${m.title}</h3>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 truncate">${m.locations}</p>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="p-3 bg-slate-50 rounded-2xl">
                        <p class="text-[8px] font-black text-slate-300 uppercase mb-1">Director</p>
                        <p class="text-[11px] font-bold text-slate-700 truncate">${m.director || '—'}</p>
                    </div>
                    <div class="p-3 bg-slate-50 rounded-2xl">
                        <p class="text-[8px] font-black text-slate-300 uppercase mb-1">Production</p>
                        <p class="text-[11px] font-bold text-slate-700 truncate">${m.production_company || '—'}</p>
                    </div>
                </div>

                <div class="mt-auto pt-4 border-t border-slate-100">
                    <p class="text-[9px] font-black text-slate-300 uppercase mb-2">Principal Casting</p>
                    <div class="flex flex-wrap gap-1">
                        ${[m.actor_1, m.actor_2, m.actor_3].filter(Boolean).map(a => `<span class="text-[10px] font-bold text-slate-600 bg-slate-100 px-2 py-0.5 rounded-md">${a}</span>`).join('')}
                    </div>
                </div>
                
                ${m.fun_facts ? `<div class="mt-4 p-3 bg-blue-50/50 rounded-xl text-[10px] italic text-blue-700 leading-tight">"${m.fun_facts}"</div>` : ''}
            `;
            card.onclick = () => {
                map.flyTo([m.latitude, m.longitude], 14, { duration: 1.5 });
                setTimeout(() => marker.openPopup(), 1600);
            };
            tray.appendChild(card);
        });

        updateCharts(data);
    }

    function updateCharts(data) {
        // Stats Ratings
        const rStats = [0,0,0,0];
        data.forEach(m => {
            const r = m.imdb_rating;
            if(r < 7) rStats[0]++; else if(r < 8) rStats[1]++; else if(r < 9) rStats[2]++; else rStats[3]++;
        });
        ratingChart.data.datasets[0].data = rStats;
        ratingChart.update();

        // Stats Years
        const yCounts = {};
        data.map(m => m.release_year).sort().forEach(y => yCounts[y] = (yCounts[y] || 0) + 1);
        yearChart.data.labels = Object.keys(yCounts);
        yearChart.data.datasets[0].data = Object.values(yCounts);
        yearChart.update();
    }

    function bindEvents() {
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('yearMin').addEventListener('input', applyFilters);
        document.getElementById('yearMax').addEventListener('input', applyFilters);
        document.getElementById('ratingMin').addEventListener('input', (e) => {
            document.getElementById('ratingVal').innerText = parseFloat(e.target.value).toFixed(1);
            applyFilters();
        });
        document.getElementById('resetFilters').onclick = () => {
            document.getElementById('searchInput').value = "";
            document.getElementById('yearMin').value = "";
            document.getElementById('yearMax').value = "";
            document.getElementById('ratingMin').value = 0;
            document.getElementById('ratingVal').innerText = "0.0";
            selectedGenres.clear();
            document.querySelectorAll('#genreContainer button').forEach(b => {
                b.classList.replace('bg-blue-600', 'bg-slate-100');
                b.classList.replace('text-white', 'text-slate-500');
            });
            applyFilters();
        };
    }

    window.onload = init;
</script>

</body>
</html>
